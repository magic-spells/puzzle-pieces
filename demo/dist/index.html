<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light dark">
  <title>puzzle-pieces demo</title>
  <script>
    // Apply saved theme and scheme choices before first paint to avoid a flash.
    (function () {
      try {
        var t = localStorage.getItem('pieces-theme');
        if (t === 'light' || t === 'dark') document.documentElement.dataset.theme = t;
        var s = localStorage.getItem('pieces-scheme');
        if (s === 'claw' || s === 'void' || s === 'dim') document.documentElement.dataset.scheme = s;
      } catch (e) {}
    })();
  </script>
  <!-- Relative asset paths so the single-page bundle works both at a domain
       root and under a sub-path (e.g. GitHub Pages project sites). -->
  <link href="./styles.css" rel="stylesheet">
</head>
<body>
  <div id="app"></div>
  <script type="module" src="./app.js"></script>
</body>
</html>
